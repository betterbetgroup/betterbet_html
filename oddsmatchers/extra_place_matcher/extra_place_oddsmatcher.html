<script>
    




document.addEventListener('DOMContentLoaded', () => {

    append_options_for_dropdowns();

    create_event_listeners_for_select_containers();

    create_text_box_and_time_dropdown_event_listeners();

    add_event_listener_for_saved_filters();


});



document.querySelector('.save-filter-button').addEventListener('click', () => {

    open_text_box_and_confirm();

    // THEN TEXT BOX OPENS WITH A CONFIRM BUTTON AND THE CONFIRM AND CANCEL LISTERNERS ARE THERE FOR THAT

});





document.querySelector('.cancel-making-filter').addEventListener('click', () => {

    close_boxes();

});




document.querySelector('.confirm-filter-name').addEventListener('click', () => {


    filter_name = get_name_and_close_boxes();

    // FUNCTION THAT TAKES GLOBAL FILTERS AND ADDS IT TO CUSTOM FILTERS BEFORE IT GOES INTO THE OPTIONS FOR THE DROPDOWN
    obj = append_global_filters_to_options(filter_name);

    if (filter_name == '') {
        
        return;

    }



    // REMOVE FROM DROP DOWN IF THERE IS ALREADY SOMETHING WITH THAT NAME
    if (obj.is_delete) {

        removeOptionFromDropdown(filter_name);

    }

    // APPEND FILTER TO OPTIONS USING JUST THE NAME AS IT GETS THE VALUE IN THE FUNCTION

    append_filter_to_options(filter_name);


    // MAKE THE FILTER THE SELECTED FILTER AFTER IT'S CREATED

    make_filter_selection_value_as_saved(filter_name);

    remove_all_option_style();

    set_background_for_current_option(filter_name)


    // SEND TO WIX SITE SO IT CAN BE STORED FOR WHEN THEY OPEN IT

    const message = {
        type: 'Save Filter',
        filter_name: filter_name,
        filters: obj.filters_to_send 
    };

    window.parent.postMessage(message, '*'); 


});












function updateGlobalFilters(filterId) {

    // RUNS EACH TIME A FILTER VALUE CHANGES

    // TAKE SPECIFIC FILTER ID AND TAKE THE VALUE FROM THAT FILTER AND UPDATE GLOBAL FILTERS

    // SHOULD BE CALLED ON INPUT IN FILTER BOXES 

    go_to_input_and_update_global_for_the_input(filterId);


    // FUNCTION TO CHECK THE NEW GLOBAL FILTERS WITH DROPDOWN VALUE

    // FOR EACH KEY IN CUSTOM FILTERS CHECK IF IT MATCHES THE DROPDOWN. IF IT DOES THEN CHANGE IT ELSE (NO SELECTED FILTER)

    check_if_dropdown_matches_global_filter_settings();


    // IMPORTANT TO FILTERDATA AS THERE MAY OBVIOUSLY BE CHANGES
    filterData();

}







// SORT DATA, THEN FILTER DATA TO ACTUALLY APPLY THE CHANGES

// IMPORTANT THAT FILTER DATA IS CALLED AFTER

function sort_data(sort_by, method) {

        if (sort_by == 'Implied Odds') {
            globalData = sort_rows_by_ImpliedOdds(globalData, method)
        } else if (sort_by == 'potential profit') {
            globalData = sort_rows_by_potential_profit(globalData, method)
        } else if (sort_by == 'qualifying loss') {
            globalData = sort_rows_by_qualifying_loss(globalData, method)
        } else if (sort_by == 'date and time') {
            globalData = sort_rows_by_date_and_time(globalData, method)
        }

}








// ON MESSAGE FROM WIX

// ADJUSTS THE WIDTH AND FILTERS DATA PRESUMABLY BECAUSE IT ALSO RECEIVES PREMIUM MEMBER DATA ( SHOULD CHANGE THIS )

function adjustWidth(newWidth) {

    make_width_changes_based_on_wix_site_width(newWidth);

    // THEN AFTER, FILTER DATA, CAN'T REMEMBER WHY, MAYBE AS PREMIUM MEMBER DATA COMES IN THIS 

    filterData();

}











// SET PAGE TO 1

// GET UPDATED FILTERED DATA USING GLB-FILTERS AND GLB-DATA

// SET UP PAGINATION CAUSING IT TO DISPLAY THE ROWS USING CURRENT PAGE AND FILTERED-DATA

function filterData() {

    currentPage = 1;

    sort_type = get_sort_type_using_current_sort();

    sort_data(current_sort, sort_type);
    
    function_using_global_data_and_global_filters_to_make_filtered_data();

    setupPagination();


}







// AFTER RECEIVING FROM WIX

// CALLED ON MESSAGE FROM WIX CONTAINING FILTERS. IT SHOULD DELETE ALL OPTIONS EXCEPT QUALIFYING BET, THEN FOR EACH FILTER AND NAME IN OBJECT APPEND TO CUSTOM FILTERS AND ADD OPTION

function add_filters(filterObject) {

    removeNonQualifyingBetOptions();

    if (Object.keys(filterObject).length === 0) {
        return; 
    }

    for (const [filterName, filters] of Object.entries(filterObject)) {

        customFilters[filterName] = filters;

        append_filter_to_options(filterName);
    }


}







// ALWAYS SET THE CUSTOM FILTERS NEW FILTER JUST BEFORE DOING THIS - SHOULD BE ON LOAD, WHEN FILTER CREATED (WHERE IT SHOULD ALSO DELETE DUPLICATES AND SWITCH TO THAT FILTER), AND WHEN RECEIVING FROM WIX

function append_filter_to_options(name_for_filter) {

    if (name_for_filter == "") {
        return
    }

    append_filter_name_to_filter_options_in_dropdown(name_for_filter);


}









// TAKES GLOBAL FILTERS AND ADDS IT TO CUSTOM FILTERS WITH NAME - AFTER HAVING CREATED A NEW FILTER

// AFTER THIS IT SHOULD BE ADDED TO OPTIONS AND SENT TO WIX 

function append_global_filters_to_options(name_for_filter) {

    // also returns data about if its a duplicate i.e should it delete values at the name first

    return function_that_takes_global_filters_and_appends_it_to_current_with_name(name_for_filter)

}








// SETS THE INPUT FILTERS USING THE FILTERS GOTTEN FROM THE DROPDOWN - ON LOAD AND ON CLICK DROPDOWN (using custom filters object)

function apply_custom_filters_from_dropdown(filters) {

    // ONLY SETS THE INPUT AS THE CORRECT INPUTS - AFTER THIS IS CALLED NEED TO UPDATE TABLE WITH FILTERDATA()

    set_input_values_using_filter(filters);

}







// RECEIVE MESSAGE FROM WIX SITE - CALLS FILTER DATA - OR ADJUST WIDTH - OR ADD FILTERS

window.addEventListener('message', (event) => {
    
    const data = event.data;

    if (data.rows) {

        if (data.width) {
            is_premium_member = data.premium_member;
            adjustWidth(data.width);
        } 
        
        globalData = data.rows;
        if (data.wix_filters) {
            add_filters(data.wix_filters)
        }
        filterData();
    }  
    
});










// APPEND THE ROWS TO THE PAGE - TAKING CURRENT PAGE ROWS

function appendRows(rows) {

    check_row_info_in_append_rows();

    // ALSO EMPTIES THE TABLE BEFORE DISPLAYING NEW DATA

    rows.forEach(row => {

        create_row(row);

    });



    add_lock_if_premium();

    make_odds_and_platform_small_if_screen_small();


}








// EVENT LISTENER ON WHOLE DOCUMENT. IF CLICKING SELECT, INFO, OR UPGRADE

// ALSO LISTENS FOR SORT_BY BUTTONS - THEN RUNS FUNCTION IF IT RELATES

document.getElementById('container-div').addEventListener('click', function(event) {


    if (event.target.classList.contains('sort_by')) {

        if (is_premium_member) {

            sort_data_on_click(event);

        }

    } else {

        process_click_message_info_select_and_upgrade(event);

    }


});





globalData = example_data;



// QUALIFYING BET IS ADDED AS AN OPTION IN THE FILTERS DROPDOWN

append_filter_to_options('Bet365 All times')  // CAN ALSO ADD A FREE BET OPTION

make_filter_selection_value_as_saved('Bet365 All times'); 

// MAKE SURE THIS HAPPENS AFTER THE 'QUALIFYING BET' FILTER IS ADDED AS AN OPTION

// GET THE INITIAL FILTER - WHICH IS THE QUALIFYING BET AS THE FUNCTION ALREADY ADDED IT AND APPLY IT THEN SET GLOBAL EQUAL TO FILTER

set_background_for_current_option('Bet365 All times') 


filtName = get_selected_filter_name();
let filterobj = customFilters[filtName];


// KEEP THESE THREE IN THIS ORDER

apply_custom_filters_from_dropdown(filterobj);
set_global_filters_as_filters_selected_in_dropdown(filterobj);
filterData();

 
</script>
